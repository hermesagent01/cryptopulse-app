<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TA — CryptoPulse</title><meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="CryptoPulse">
<link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="pwa-icon-192.png"><link rel="icon" type="image/png" sizes="192x192" href="pwa-icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&family=Orbitron:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head><body data-page="ta">
<div class="main">
<div style="margin-bottom:14px"><div class="sl">Deep Analysis</div><div class="st2">Technical Analysis</div></div>
<div style="display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap" id="tf"><button class="fl act" onclick="fTA(this,'all')">All</button><button class="fl" onclick="fTA(this,'buy')">Buy</button><button class="fl" onclick="fTA(this,'sell')">Sell</button><button class="fl" onclick="fTA(this,'no')">No Trade</button></div>
<div class="gb" style="overflow-x:auto;margin-bottom:20px"><table><thead><tr><th>Asset</th><th>Verdict</th><th>Price</th><th>Entry</th><th>Stop</th><th>Target</th><th>R:R</th><th>RSI 1H</th><th>RSI 4H</th><th>Vol</th><th>VA</th></tr></thead><tbody id="tb"></tbody></table></div>
<div class="sl">Stocks & Forex</div>
<div style="display:flex;gap:4px;margin:5px 0 8px;flex-wrap:wrap" id="sff"><button class="fl act" onclick="fSF(this,'all')">All</button><button class="fl" onclick="fSF(this,'stock')">Stocks</button><button class="fl" onclick="fSF(this,'forex')">Forex</button></div>
<div class="gb" style="overflow-x:auto;margin-bottom:20px"><table><thead><tr><th>Symbol</th><th>Verdict</th><th>Price</th><th>Entry</th><th>Stop</th><th>Target</th><th>R:R</th><th>RSI</th><th>MA20</th><th>Range</th></tr></thead><tbody id="sb"></tbody></table></div>
<div class="sl">Portfolio</div>
<div class="gb" style="margin-bottom:10px"><div style="padding:12px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:.45rem;color:rgba(255,255,255,.07);text-transform:uppercase;letter-spacing:.06em">Equity Curve</span><span style="font-size:.38rem;color:rgba(255,255,255,.04)" id="eu">—</span></div><canvas id="ec" style="width:100%;height:80px;display:block"></canvas></div></div>
<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:8px;margin-bottom:20px" id="pg"></div>
<div class="sl">Latest News</div>
<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:8px;margin-bottom:20px" id="ng"></div>
<div class="sl">Briefs</div>
<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px" id="bg2"></div>
<div style="text-align:center;margin-top:24px;padding:16px;border:1px solid rgba(29,155,240,.08);border-radius:12px;background:rgba(29,155,240,.02)"><div style="font-size:.72rem;font-weight:800;color:#fff;margin-bottom:2px">Follow @bnb_wizard</div><div style="font-size:.5rem;color:rgba(255,255,255,.12);margin-bottom:8px">Live signal alerts and market analysis</div><a href="https://x.com/bnb_wizard" target="_blank" rel="noopener" style="display:inline-block;padding:7px 20px;border-radius:100px;background:rgba(29,155,240,.08);border:1px solid rgba(29,155,240,.18);color:#fff;font-weight:700;font-size:.6rem;text-decoration:none;transition:all .3s">Follow on 𝕏</a></div>
<div style="text-align:center;margin-top:20px;font-size:.4rem;color:rgba(255,255,255,.03);text-transform:uppercase;letter-spacing:.1em">CryptoPulse · Not financial advice</div>
</div>
<script src="shared.js"></script>
<script>
var TF='all',SFF='all',_tas=[],_sf=[];
function fTA(b,v){document.querySelectorAll('#tf .fl').forEach(function(f){f.classList.remove('act')});b.classList.add('act');TF=v;rTA()}
function fSF(b,v){document.querySelectorAll('#sff .fl').forEach(function(f){f.classList.remove('act')});b.classList.add('act');SFF=v;rSF()}
document.addEventListener('app:ready',function(e){
  var D=e.detail;_tas=D.tas||[];_sf=D.stocks_forex||[];
  var pf=D.portfolio||{},tl=D.trade_log||{},sigs=D.signals||[],news=D.news||[],briefs=D.briefs||{};
  var active=sigs.filter(function(s){return s.active!==false}),bal=pf.current_balance||tl.current_balance||1000;
  rTA();rSF();
  // Equity
  rEq(pf.equity_curve||[]);document.getElementById('eu').textContent='Updated '+new Date().toISOString().slice(0,10);
  // Positions
  var ps=active.slice(0,3),pg=document.getElementById('pg');
  if(!ps.length)pg.innerHTML='<p style="color:rgba(255,255,255,.05);font-size:.52rem;text-align:center;padding:10px;grid-column:1/-1">No open positions</p>';
  else pg.innerHTML=ps.map(function(s,i){var cp=s.current_price?(s.direction==='long'?s.current_price-s.entry:s.entry-s.current_price):0,pp=s.entry?((cp/s.entry)*100).toFixed(2):'0.00',pv=(bal*.2).toFixed(2),pP=(cp*bal*.2/s.entry).toFixed(2);
    return '<div class="gb c3d '+(s.direction==='long'?'l':'s')+' fu" style="animation-delay:'+i*50+'ms;position:relative;overflow:visible"><div class="sa"></div><div style="padding:10px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><span style="font-weight:800;font-size:.7rem;color:#fff">'+s.pair+'</span><span style="font-size:.4rem;padding:2px 6px;border-radius:100px;border:1px solid;font-weight:700;'+(s.direction==='long'?'color:rgba(255,255,255,.4);border-color:rgba(255,255,255,.07)':'color:#ef4444;border-color:rgba(239,68,68,.12)')+'">'+(s.direction==='long'?'▲ LONG':'▼ SHORT')+'</span></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:4px"><div style="background:rgba(255,255,255,.01);border-radius:7px;padding:5px;text-align:center"><div style="font-size:.32rem;color:rgba(255,255,255,.05)">Entry</div><div class="fm" style="font-weight:700;font-size:.55rem">$'+fmt(s.entry)+'</div></div><div style="background:rgba(255,255,255,.01);border-radius:7px;padding:5px;text-align:center"><div style="font-size:.32rem;color:rgba(255,255,255,.05)">Current</div><div class="fm" style="font-weight:700;font-size:.55rem">$'+fmt(s.current_price)+'</div></div></div><div style="font-size:.38rem;color:rgba(255,255,255,.05);margin-bottom:3px">Size: $'+pv+' (20%)</div><div style="padding-top:4px;border-top:1px solid rgba(255,255,255,.02);display:flex;justify-content:space-between"><span style="font-size:.38rem;color:rgba(255,255,255,.04)">PnL</span><span class="fm" style="font-weight:800;font-size:.55rem;'+(cp>=0?'color:#c0c0c0':'color:#ef4444')+'">'+(cp>=0?'+':'')+'$'+pP+' ('+pp+'%)</span></div></div></div>'}).join('');
  // News
  document.getElementById('ng').innerHTML=news.slice(0,4).map(function(n){return '<div class="gb fu"><div style="padding:10px"><span style="font-size:.38rem;padding:2px 5px;border-radius:100px;border:1px solid;display:inline-block;margin-bottom:4px;font-weight:700;'+(n.icon_color==='green'?'color:#22c55e;border-color:rgba(34,197,94,.12)':n.icon_color==='amber'?'color:#f59e0b;border-color:rgba(245,158,11,.12)':'color:rgba(255,255,255,.12);border-color:rgba(255,255,255,.03)')+'">'+(n.source_icon||n.source)+'</span><div style="font-weight:700;font-size:.6rem;color:#fff;margin-bottom:2px;line-height:1.25">'+n.title+'</div><p style="font-size:.48rem;color:rgba(255,255,255,.1);line-height:1.4">'+n.summary+'</p><span style="font-size:.36rem;color:rgba(255,255,255,.03);display:block;margin-top:3px">'+n.date+'</span></div></div>'}).join('');
  // Briefs
  var ab=[].concat(briefs.daily||[],briefs.weekly||[]);
  document.getElementById('bg2').innerHTML=ab.map(function(b){return '<div class="gb fu"><div style="padding:10px"><span style="font-size:.4rem;color:rgba(255,255,255,.12);font-weight:600;margin-bottom:3px;display:block">'+b.date+'</span><div style="font-weight:700;font-size:.65rem;color:#fff;margin-bottom:5px;line-height:1.2">'+b.title+'</div>'+(b.sections||[]).map(function(s){return '<div style="margin-left:4px;padding-left:7px;border-left:1px solid rgba(192,192,192,.04);margin-bottom:4px"><div style="font-size:.4rem;font-weight:700;color:rgba(192,192,192,.12);text-transform:uppercase;letter-spacing:.03em;margin-bottom:1px">'+s.heading+'</div><p style="font-size:.48rem;color:rgba(255,255,255,.08);line-height:1.4">'+s.content+'</p></div>'}).join('')+'</div></div>'}).join('');
});
function rTA(){var f=_tas;if(TF==='buy')f=_tas.filter(function(t){return t.verdict==='BUY'});else if(TF==='sell')f=_tas.filter(function(t){return t.verdict==='SELL'});else if(TF==='no')f=_tas.filter(function(t){return t.verdict==='NO'||t.verdict==='NO TRADE'});
document.getElementById('tb').innerHTML=f.map(function(t){var r1=t.rsi_1h||0,r4=t.rsi_4h||0;var vc=t.verdict==='BUY'?'color:rgba(255,255,255,.4);border-color:rgba(255,255,255,.07)':t.verdict==='SELL'?'color:#ef4444;border-color:rgba(239,68,68,.12)':'color:rgba(255,255,255,.07);border-color:rgba(255,255,255,.02)';return '<tr><td style="font-weight:700;color:#fff">'+t.symbol+'</td><td><span style="font-size:.38rem;padding:2px 5px;border-radius:100px;border:1px solid;font-weight:700;'+vc+'">'+(t.verdict||'—')+'</span></td><td class="fm" style="font-size:.55rem">$'+fmt(t.current_price)+'</td><td class="fm" style="font-size:.55rem">'+(t.entry?'$'+fmt(t.entry):'—')+'</td><td class="fm" style="font-size:.55rem;color:#ef4444">'+(t.stop?'$'+fmt(t.stop):'—')+'</td><td class="fm" style="font-size:.55rem;color:#c0c0c0">'+(t.target?'$'+fmt(t.target):'—')+'</td><td class="fm" style="font-size:.55rem;font-weight:700">'+(t.rr||'—')+'</td><td class="fm" style="font-size:.55rem;'+(r1<30?'color:#ef4444':r1>70?'color:#f59e0b':'color:#c0c0c0')+'">'+r1.toFixed(1)+'</td><td class="fm" style="font-size:.55rem;'+(r4<30?'color:#ef4444':r4>70?'color:#f59e0b':'color:#c0c0c0')+'">'+r4.toFixed(1)+'</td><td class="fm" style="font-size:.48rem;color:rgba(255,255,255,.06)">'+(t.vol_1h||'—')+'</td><td style="font-size:.45rem;color:rgba(255,255,255,.05)">'+(t.va_1h||'—')+'</td></tr>'}).join('')}
function rSF(){var f=_sf;if(SFF==='stock')f=_sf.filter(function(s){return s.sector==='stock'});else if(SFF==='forex')f=_sf.filter(function(s){return s.sector==='forex'});
document.getElementById('sb').innerHTML=f.map(function(s){var r=s.rsi_1d||0;return '<tr><td style="font-weight:700;color:#fff">'+s.symbol+'<span style="font-size:.32rem;color:rgba(255,255,255,.05);margin-left:3px">'+(s.sector||'').toUpperCase()+'</span></td><td><span style="font-size:.38rem;padding:2px 5px;border-radius:100px;border:1px solid;font-weight:700;'+(s.verdict==='BUY'?'color:rgba(255,255,255,.4);border-color:rgba(255,255,255,.07)':s.verdict==='SELL'?'color:#ef4444;border-color:rgba(239,68,68,.12)':'color:rgba(255,255,255,.07);border-color:rgba(255,255,255,.02)')+'">'+(s.verdict||'—')+'</span></td><td class="fm" style="font-size:.55rem">$'+fmt(s.current_price)+'</td><td class="fm" style="font-size:.55rem">'+(s.entry?'$'+fmt(s.entry):'—')+'</td><td class="fm" style="font-size:.55rem;color:#ef4444">'+(s.stop?'$'+fmt(s.stop):'—')+'</td><td class="fm" style="font-size:.55rem;color:#c0c0c0">'+(s.target?'$'+fmt(s.target):'—')+'</td><td class="fm" style="font-size:.55rem;font-weight:700">'+(s.rr||'—')+'</td><td class="fm" style="font-size:.55rem;'+(r<30?'color:#ef4444':r>70?'color:#f59e0b':'color:#c0c0c0')+'">'+r.toFixed(1)+'</td><td style="font-size:.48rem;color:rgba(255,255,255,.06)">'+(s.ma20?'$'+fmt(s.ma20):'—')+'</td><td style="font-size:.42rem;color:rgba(255,255,255,.04)">'+(s.high14&&s.low14?'$'+fmt(s.low14)+'–$'+fmt(s.high14):'—')+'</td></tr>'}).join('')}
function rEq(curve){var c=document.getElementById('ec');if(!c||!curve.length)return;var ctx=c.getContext('2d'),dpr=devicePixelRatio||1,rect=c.getBoundingClientRect();c.width=rect.width*dpr;c.height=rect.height*dpr;ctx.scale(dpr,dpr);var w=rect.width,h=rect.height,pad={t:4,b:10,l:32,r:6},vals=curve.map(function(x){return x.value}),mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),r=mx-mn||1;ctx.strokeStyle='rgba(192,192,192,.03)';ctx.lineWidth=.5;for(var i=0;i<=4;i++){var y=pad.t+i*(h-pad.t-pad.b)/4;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke()}var xs=(w-pad.l-pad.r)/(vals.length-1);ctx.beginPath();vals.forEach(function(v,j){var x=pad.l+j*xs,y=pad.t+(1-(v-mn)/r)*(h-pad.t-pad.b);j===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});ctx.strokeStyle='#c0c0c0';ctx.lineWidth=1.5;ctx.shadowColor='rgba(192,192,192,.2)';ctx.shadowBlur=5;ctx.stroke();ctx.shadowBlur=0;ctx.lineTo(pad.l+(vals.length-1)*xs,h-pad.b);ctx.lineTo(pad.l,h-pad.b);ctx.closePath();var g=ctx.createLinearGradient(0,pad.t,0,h-pad.b);g.addColorStop(0,'rgba(192,192,192,.04)');g.addColorStop(1,'rgba(192,192,192,0)');ctx.fillStyle=g;ctx.fill();ctx.fillStyle='rgba(255,255,255,.05)';ctx.font='6px JetBrains Mono';ctx.textAlign='right';for(var k=0;k<=4;k++){var v2=mx-k*r/4;ctx.fillText('$'+v2.toFixed(0),pad.l-2,pad.t+k*(h-pad.t-pad.b)/4+3)}}
</script></body></html>
